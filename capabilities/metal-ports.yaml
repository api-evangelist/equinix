naftiko: 1.0.0-alpha2
info:
  label: Metal API — Ports
  description: 'Metal API — Ports. 14 operations. Lead operation: Retrieve a port. Self-contained Naftiko capability covering
    one Equinix business surface.'
  tags:
  - Equinix
  - Ports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-ports
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — Ports business capability. Self-contained, no shared references.
    resources:
    - name: ports-id
      path: /ports/{id}
      operations:
      - name: findportbyid
        method: GET
        description: Retrieve a port
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Port UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
    - name: ports-id-assign
      path: /ports/{id}/assign
      operations:
      - name: assignport
        method: POST
        description: Assign a port to virtual network
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Port UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: ports-id-bond
      path: /ports/{id}/bond
      operations:
      - name: bondport
        method: POST
        description: Enabling bonding
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Port UUID
          required: true
        - name: bulk_enable
          in: query
          type: boolean
          description: enable both ports
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
    - name: ports-id-convert-layer-2
      path: /ports/{id}/convert/layer-2
      operations:
      - name: convertlayer2
        method: POST
        description: Convert to Layer 2
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Port UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: ports-id-convert-layer-3
      path: /ports/{id}/convert/layer-3
      operations:
      - name: convertlayer3
        method: POST
        description: Convert to Layer 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Port UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: ports-id-disbond
