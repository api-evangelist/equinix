naftiko: 1.0.0-alpha2
info:
  label: Metal API — Emails
  description: 'Metal API — Emails. 4 operations. Lead operation: Create an email. Self-contained Naftiko capability covering
    one Equinix business surface.'
  tags:
  - Equinix
  - Emails
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-emails
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — Emails business capability. Self-contained, no shared references.
    resources:
    - name: emails
      path: /emails
      operations:
      - name: createemail
        method: POST
        description: Create an email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: emails-id
      path: /emails/{id}
      operations:
      - name: deleteemail
        method: DELETE
        description: Delete the email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Email UUID
          required: true
      - name: findemailbyid
        method: GET
        description: Retrieve an email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Email UUID
          required: true
      - name: updateemail
        method: PUT
        description: Update the email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Email UUID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.EQUINIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metal-emails-rest
    port: 8080
    description: REST adapter for Metal API — Emails. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/emails
      name: emails
      description: REST surface for emails.
      operations:
      - method: POST
        name: createemail
        description: Create an email
        call: metal-emails.createemail
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/emails/{id}
      name: emails-id
      description: REST surface for emails-id.
      operations:
      - method: DELETE
        name: deleteemail
        description: Delete the email
        call: metal-emails.deleteemail
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: findemailbyid
        description: Retrieve an email
        call: metal-emails.findemailbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateemail
        description: Update the email
        call: metal-emails.updateemail
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metal-emails-mcp
    port: 9090
    transport: http
    description: MCP adapter for Metal API — Emails. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-email
      description: Create an email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metal-emails.createemail
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-email
      description: Delete the email
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: metal-emails.deleteemail
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-email
      description: Retrieve an email
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-emails.findemailbyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-email
      description: Update the email
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: metal-emails.updateemail
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
