naftiko: 1.0.0-alpha2
info:
  label: Metal API — Metros
  description: 'Metal API — Metros. 2 operations. Lead operation: Retrieve all metros. Self-contained Naftiko capability covering
    one Equinix business surface.'
  tags:
  - Equinix
  - Metros
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-metros
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — Metros business capability. Self-contained, no shared references.
    resources:
    - name: locations-metros
      path: /locations/metros
      operations:
      - name: findmetros
        method: GET
        description: Retrieve all metros
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: locations-metros-id
      path: /locations/metros/{id}
      operations:
      - name: getmetro
        method: GET
        description: Retrieve a specific Metro's details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Metro UUID
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.EQUINIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metal-metros-rest
    port: 8080
    description: REST adapter for Metal API — Metros. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/locations/metros
      name: locations-metros
      description: REST surface for locations-metros.
      operations:
      - method: GET
        name: findmetros
        description: Retrieve all metros
        call: metal-metros.findmetros
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/locations/metros/{id}
      name: locations-metros-id
      description: REST surface for locations-metros-id.
      operations:
      - method: GET
        name: getmetro
        description: Retrieve a specific Metro's details
        call: metal-metros.getmetro
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metal-metros-mcp
    port: 9090
    transport: http
    description: MCP adapter for Metal API — Metros. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-all-metros
      description: Retrieve all metros
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-metros.findmetros
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-specific-metro-s-details
      description: Retrieve a specific Metro's details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-metros.getmetro
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
