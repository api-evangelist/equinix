naftiko: 1.0.0-alpha2
info:
  label: Metal API — Userdata
  description: 'Metal API — Userdata. 1 operations. Lead operation: Validate user data. Self-contained Naftiko capability
    covering one Equinix business surface.'
  tags:
  - Equinix
  - Userdata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-userdata
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — Userdata business capability. Self-contained, no shared references.
    resources:
    - name: userdata-validate
      path: /userdata/validate
      operations:
      - name: validateuserdata
        method: POST
        description: Validate user data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userdata
          in: query
          type: string
          description: Userdata to validate
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.EQUINIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metal-userdata-rest
    port: 8080
    description: REST adapter for Metal API — Userdata. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/userdata/validate
      name: userdata-validate
      description: REST surface for userdata-validate.
      operations:
      - method: POST
        name: validateuserdata
        description: Validate user data
        call: metal-userdata.validateuserdata
        with:
          userdata: rest.userdata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metal-userdata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Metal API — Userdata. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: validate-user-data
      description: Validate user data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: metal-userdata.validateuserdata
      with:
        userdata: tools.userdata
      outputParameters:
      - type: object
        mapping: $.
