naftiko: 1.0.0-alpha2
info:
  label: Metal API — UserVerificationTokens
  description: 'Metal API — UserVerificationTokens. 2 operations. Lead operation: Create an email verification request. Self-contained
    Naftiko capability covering one Equinix business surface.'
  tags:
  - Equinix
  - UserVerificationTokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-userverificationtokens
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — UserVerificationTokens business capability. Self-contained, no shared references.
    resources:
    - name: verify-email
      path: /verify-email
      operations:
      - name: createvalidationrequest
        method: POST
        description: Create an email verification request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: login
          in: query
          type: string
          description: Email for verification request
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
      - name: consumeverificationrequest
        method: PUT
        description: Verify a user using an email verification token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.EQUINIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metal-userverificationtokens-rest
    port: 8080
    description: REST adapter for Metal API — UserVerificationTokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/verify-email
      name: verify-email
      description: REST surface for verify-email.
      operations:
      - method: POST
        name: createvalidationrequest
        description: Create an email verification request
        call: metal-userverificationtokens.createvalidationrequest
        with:
          login: rest.login
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: consumeverificationrequest
        description: Verify a user using an email verification token
        call: metal-userverificationtokens.consumeverificationrequest
        with:
          include: rest.include
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metal-userverificationtokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Metal API — UserVerificationTokens. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-email-verification-request
      description: Create an email verification request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metal-userverificationtokens.createvalidationrequest
      with:
        login: tools.login
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: verify-user-using-email-verification
      description: Verify a user using an email verification token
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: metal-userverificationtokens.consumeverificationrequest
      with:
        include: tools.include
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
