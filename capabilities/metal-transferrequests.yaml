naftiko: 1.0.0-alpha2
info:
  label: Metal API — TransferRequests
  description: 'Metal API — TransferRequests. 3 operations. Lead operation: Decline a transfer request. Self-contained Naftiko
    capability covering one Equinix business surface.'
  tags:
  - Equinix
  - TransferRequests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-transferrequests
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — TransferRequests business capability. Self-contained, no shared references.
    resources:
    - name: transfers-id
      path: /transfers/{id}
      operations:
      - name: declinetransferrequest
        method: DELETE
        description: Decline a transfer request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Transfer request UUID
          required: true
      - name: findtransferrequestbyid
        method: GET
        description: View a transfer request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Transfer request UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
      - name: accepttransferrequest
        method: PUT
        description: Accept a transfer request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Transfer request UUID
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.EQUINIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metal-transferrequests-rest
    port: 8080
    description: REST adapter for Metal API — TransferRequests. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/transfers/{id}
      name: transfers-id
      description: REST surface for transfers-id.
      operations:
      - method: DELETE
        name: declinetransferrequest
        description: Decline a transfer request
        call: metal-transferrequests.declinetransferrequest
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: findtransferrequestbyid
        description: View a transfer request
        call: metal-transferrequests.findtransferrequestbyid
        with:
          id: rest.id
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: accepttransferrequest
        description: Accept a transfer request
        call: metal-transferrequests.accepttransferrequest
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metal-transferrequests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Metal API — TransferRequests. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: decline-transfer-request
      description: Decline a transfer request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: metal-transferrequests.declinetransferrequest
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: view-transfer-request
      description: View a transfer request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-transferrequests.findtransferrequestbyid
      with:
        id: tools.id
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: accept-transfer-request
      description: Accept a transfer request
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: metal-transferrequests.accepttransferrequest
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
