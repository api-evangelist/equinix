naftiko: 1.0.0-alpha2
info:
  label: Metal API — Projects
  description: 'Metal API — Projects. 11 operations. Lead operation: Retrieve all projects. Self-contained Naftiko capability
    covering one Equinix business surface.'
  tags:
  - Equinix
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
