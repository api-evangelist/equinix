naftiko: 1.0.0-alpha2
info:
  label: Metal API — Devices
  description: 'Metal API — Devices. 20 operations. Lead operation: Delete the device. Self-contained Naftiko capability covering
    one Equinix business surface.'
  tags:
  - Equinix
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EQUINIX_API_KEY: EQUINIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: metal-devices
    baseUri: https://api.equinix.com/metal/v1
    description: Metal API — Devices business capability. Self-contained, no shared references.
    resources:
    - name: devices-id
      path: /devices/{id}
      operations:
      - name: deletedevice
        method: DELETE
        description: Delete the device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Device UUID
          required: true
        - name: force_delete
          in: query
          type: boolean
          description: Force the deletion of the device, by detaching any storage volume still active.
      - name: finddevicebyid
        method: GET
        description: Retrieve a device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Device UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
        - name: exclude
          in: query
          type: array
          description: Nested attributes to exclude. Excluded objects will return only the href
      - name: updatedevice
        method: PUT
        description: Update the device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Device UUID
          required: true
        - name: include
          in: query
          type: array
          description: Nested attributes to include. Included objects will return their full
        - name: exclude
          in: query
          type: array
          description: Nested attributes to exclude. Excluded objects will return only the href
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: devices-id-actions
      path: /devices/{id}/actions
      operations:
      - name: performaction
        method: POST
        description: Perform an action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Device UUID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: devices-id-bandwidth
      path: /devices/{id}/bandwidth
      operations:
      - name: findinstancebandwidth
        method: GET
        description: Retrieve an instance bandwidth
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Device UUID
          required: true
        - name: from
          in: query
          type: string
          description: Timestamp from range
          required: true
        - name: until
          in: query
          type: string
          description: Timestamp to range
          required: true
    - name: devices-id-bgp-neighbors
