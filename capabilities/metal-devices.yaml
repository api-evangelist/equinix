  - type: mcp
    namespace: metal-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Metal API — Devices. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: delete-device
      description: Delete the device
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: metal-devices.deletedevice
      with:
        id: tools.id
        force_delete: tools.force_delete
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-device
      description: Retrieve a device
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-devices.finddevicebyid
      with:
        id: tools.id
        include: tools.include
        exclude: tools.exclude
      outputParameters:
      - type: object
        mapping: $.
    - name: update-device
      description: Update the device
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: metal-devices.updatedevice
      with:
        id: tools.id
        include: tools.include
        exclude: tools.exclude
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: perform-action
      description: Perform an action
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metal-devices.performaction
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-instance-bandwidth
      description: Retrieve an instance bandwidth
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-devices.findinstancebandwidth
      with:
        id: tools.id
        from: tools.from
        until: tools.until
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-bgp-neighbor-data-this
      description: Retrieve BGP neighbor data for this device
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-devices.getbgpneighbordata
      with:
        id: tools.id
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-all-bgp-sessions
      description: Retrieve all BGP sessions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metal-devices.findbgpsessions
      with:
        id: tools.id
        include: tools.include
      outputParameters:
      - type: object
