      operations:
      - method: GET
        name: finddevicecustomdata
        description: Retrieve the custom metadata of an instance
        call: metal-devices.finddevicecustomdata
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/devices/{id}/diagnostics/health/rollup
