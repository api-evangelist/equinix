    - name: organizations-id-devices
      path: /organizations/{id}/devices
      operations:
      - name: findorganizationdevices
        method: GET
        description: Retrieve all devices of an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
