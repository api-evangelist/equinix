        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Project UUID
          required: true
        - name: query
          in: query
          type: string
          description: Search by facility code, plan name, project name, reservation short ID or device hostname
        - name: state
          in: query
          type: string
          description: Filter by hardware reservation state
        - name: provisionable
          in: query
          type: string
          description: Filter hardware reservation that is provisionable
        - name: include
          in: query
          type: array
