components:
  schemas:
    BgpDynamicNeighbor_state:
      enum:
      - active
      - deleting
      - pending
      - ready
      readOnly: true
      type: string
    VrfVirtualCircuit_status:
      description: The status changes of a VRF virtual circuit are generally the same as Virtual Circuits that aren't in a VRF. However, for VRF Virtual Circuits on Fabric VCs, the status will change to 'waiting_on_peering_details' once the Fabric service token associated with the virtual circuit has been redeemed on Fabric, and Metal has found the associated Fabric connection. At this point, users can update the subnet, MD5 password, customer IP and/or metal IP accordingly. For VRF Virtual Circuits on Dedicated Ports, we require all peering details to be set on creation of a VRF Virtual Circuit. The status will change to `changing_peering_details` whenever an active VRF Virtual Circuit has any of its peering details updated.
      enum:
      - pending
      - waiting_on_peering_details
      - activating
      - changing_peering_details
      - deactivating
      - deleting
      - active
      - expired
      - activation_failed
      - changing_peering_details_failed
      - deactivation_failed
      - delete_failed
      type: string
    Meta:
      example:
        next:
          href: href
        total: 0
        last:
          href: href
        previous:
          href: href
        last_page: 1
        self:
          href: href
        first:
          href: href
        current_page: 6
      properties:
        first:
          $ref: '#/components/schemas/Href'
        last:
          $ref: '#/components/schemas/Href'
        next:
          $ref: '#/components/schemas/Href'
        previous:
          $ref: '#/components/schemas/Href'
        self:
          $ref: '#/components/schemas/Href'
        total:
          type: integer
        current_page:
          type: integer
        last_page:
          type: integer
      type: object
    BgpDynamicNeighborCreateInput:
      example:
        bgp_neighbor_asn: 12345
        bgp_neighbor_range: 192.168.1.0/25
        tags:
        - tags
        - tags
      properties:
        bgp_neighbor_range:
          description: Network range of the dynamic BGP neighbor in CIDR format
          example: 192.168.1.0/25
          type: string
        bgp_neighbor_asn:
          description: The ASN of the dynamic BGP neighbor
          example: 12345
          type: integer
        tags:
          items:
            type: string
          type: array
      required:
      - bgp_neighbor_asn
      - bgp_neighbor_range
      type: object
    VrfRouteCreateInput:
      example:
        prefix: 0.0.0.0/0
        next_hop: 192.168.1.254
        tags:
        - tags
        - tags
      properties:
        prefix:
          description: The IPv4 prefix for the route, in CIDR-style notation. For a static default route, this will always be "0.0.0.0/0"
          example: 0.0.0.0/0
          type: string
        next_hop:
          description: The IPv4 address within the VRF of the host that will handle this route
          example: 192.168.1.254
          format: ipv4
          type: string
        tags:
          items:
            type: string
          type: array
      required:
      - next_hop
      - prefix
      type: object
