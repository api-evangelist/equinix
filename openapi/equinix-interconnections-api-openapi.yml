    VlanFabricVcCreateInput:
      properties:
        contact_email:
          description: The preferred email used for communication and notifications about the Equinix Fabric interconnection. Required when using a Project API key. Optional and defaults to the primary user email address when using a User API key.
          format: email
          type: string
        description:
          type: string
        metro:
          description: A Metro ID or code. When creating Fabric VCs (Metal Billed), this is where interconnection will be originating from, as we pre-authorize the use of one of our shared ports as the origin of the interconnection using A-Side service tokens. We only allow local connections for Fabric VCs (Metal Billed), so the destination location must be the same as the origin. For Fabric VCs (Fabric Billed), or shared connections, this will be the destination of the interconnection. We allow remote connections for Fabric VCs (Fabric Billed), so the origin of the interconnection can be a different metro set here.
          type: string
        name:
          type: string
        project:
          type: string
        redundancy:
          description: Either 'primary' or 'redundant'.
          type: string
        service_token_type:
          $ref: '#/components/schemas/VlanFabricVcCreateInput_service_token_type'
        speed:
          description: "A interconnection speed, in bps, mbps, or gbps. For Fabric VCs, this represents the maximum speed of the interconnection. For Fabric VCs (Metal Billed), this can only be one of the following: \n''50mbps'', ''200mbps'', ''500mbps'', ''1gbps'', ''2gbps'', ''5gbps'' or ''10gbps'', and is required for creation. For Fabric VCs (Fabric Billed), this field will always default to ''10gbps'' even if it is not provided.\nFor example, ''500000000'', ''50m'', or' ''500mbps'' will all work as valid inputs."
          example: 10000000000
          type: integer
        tags:
          items:
            type: string
          type: array
        type:
          $ref: '#/components/schemas/VlanFabricVcCreateInput_type'
        vlans:
          description: A list of one or two metro-based VLANs that will be set on the virtual circuits of primary and/or secondary (if redundant) interconnections respectively when creating Fabric VCs. VLANs can also be set after the interconnection is created, but are required to fully activate the virtual circuits.
          example:
          - 1000
          - 1001
          items:
            type: integer
          type: array
      required:
      - metro
      - name
      - redundancy
      - service_token_type
      - type
      type: object
