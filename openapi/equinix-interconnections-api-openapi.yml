        id:
          description: "The UUID that can be used on the Fabric Portal to redeem either an A-Side or Z-Side Service Token.\nFor Fabric VCs (Metal Billed), this UUID will represent an A-Side Service Token, which will allow interconnections\nto be made from Equinix Metal to other Service Providers on Fabric. For Fabric VCs (Fabric Billed), this UUID will\nrepresent a Z-Side Service Token, which will allow interconnections to be made to connect an owned Fabric Port or \nVirtual Device to Equinix Metal."
          format: uuid
          type: string
        max_allowed_speed:
          description: "The maximum speed that can be selected on the Fabric Portal when configuring a interconnection with either \nan A-Side or Z-Side Service Token. For Fabric VCs (Metal Billed), this is what the billing is based off of, and can be one\nof the following options, '50mbps', '200mbps', '500mbps', '1gbps', '2gbps', '5gbps' or '10gbps'. For Fabric VCs\n(Fabric Billed), this will default to 10Gbps."
          example: 10000000000
          type: integer
        role:
          $ref: '#/components/schemas/FabricServiceToken_role'
        service_token_type:
          $ref: '#/components/schemas/FabricServiceToken_service_token_type'
        state:
          $ref: '#/components/schemas/FabricServiceToken_state'
