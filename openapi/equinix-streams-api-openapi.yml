  /fabric/v4/streams/{streamId}/{asset}/{assetId}:
    get:
      tags:
      - Streams
      summary: Get Asset
      description: This API provides capability to get user's assets attached to a stream
      operationId: getStreamAssetByUuid
      parameters:
      - name: assetId
        in: path
        description: asset UUID
        required: true
        schema:
          $ref: '#/components/schemas/AssetId_1'
      - name: asset
        in: path
        description: asset
        required: true
        schema:
          $ref: '#/components/schemas/Asset'
      - name: streamId
        in: path
        description: Stream UUID
        required: true
        schema:
          $ref: '#/components/schemas/StreamId'
      responses:
        '200':
          description: Stream asset object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamAsset'
              examples:
                StreamSubscriptionResponse:
                  $ref: '#/components/examples/StreamConnectionAssetResponseExample'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
              examples:
                example:
                  $ref: '#/components/examples/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
              examples:
                example:
                  $ref: '#/components/examples/403'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
              examples:
                example:
                  $ref: '#/components/examples/404'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
              examples:
                example:
                  $ref: '#/components/examples/500'
    put:
      tags:
      - Streams
      summary: Attach Asset
      description: This API provides capability to attach an asset to a stream
      operationId: updateStreamAssetByUuid
      parameters:
      - name: assetId
        in: path
        description: asset UUID
        required: true
        schema:
          $ref: '#/components/schemas/AssetId_1'
      - name: asset
        in: path
        description: asset
        required: true
        schema:
          $ref: '#/components/schemas/Asset'
      - name: streamId
        in: path
        description: Stream UUID
        required: true
        schema:
          $ref: '#/components/schemas/StreamId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamAssetPutRequest'
            examples:
              UpdateStream:
                $ref: '#/components/examples/StreamAssetPutRequestExample'
        required: true
      responses:
        '202':
          description: Stream object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamAsset'
              examples:
                StreamAssetResponse:
                  $ref: '#/components/examples/StreamRouterAssetAttachResponseExample'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
              examples:
                example:
                  $ref: '#/components/examples/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorList'
              examples:
                example:
