  schemas:
    TimeServiceSimpleExpression:
      type: object
      properties:
        property:
          type: string
          description: "Possible field names to use on filters:\n * `/project/projectId` - project id (mandatory)\n * `/name` - Precision Time Service name\n * `/uuid` - Precision Time Service uuid\n * `/type` - Precision Time Service protocol\n * `/state` - Precision Time Service status\n * `/account/accountNumber` - Precision Time Service account number\n * `/package/code` - Precision Time Service package\n * `/*` - all-category search\n"
          example: /name
        operator:
          type: string
          description: "Possible operators to use on filters:\n * `=` - equal\n * `!=` - not equal\n * `[NOT] BETWEEN` - (not) between\n * `[NOT] LIKE` - (not) like\n * `[NOT] IN` - (not) in\n * `ILIKE` - case-insensitive like\n"
          example: '='
        values:
          type: array
          items:
            type: string
            example: FabricPrecisionTimeService-1
    NetworkEquinixStatus:
      type: string
      description: Network status
      enum:
      - PROVISIONING
      - PROVISIONED
      - NOT_PROVISIONED
      - DEPROVISIONING
      - DEPROVISIONED
      - NOT_DEPROVISIONED
    Bandwidths:
      type: array
      items:
        $ref: '#/components/schemas/Bandwidth'
    ptpAdvanceConfiguration:
      type: object
      properties:
        timeScale:
          type: string
          description: Time Scale value, ARB denotes Arbitrary and PTP denotes Precision Time Protocol.
          example: ARB
          enum:
          - ARB
          - PTP
        domain:
          maximum: 127
          minimum: 0
          type: integer
          description: The PTP domain value.
          example: 0
        priority1:
          maximum: 248
          minimum: 0
          type: integer
          description: The priority1 value determines the best primary clock, Lower value indicates higher priority.
          example: 128
        priority2:
          maximum: 248
          minimum: 0
          type: integer
          description: The priority2 value differentiates and prioritizes the primary clock to avoid confusion when priority1-value is the same for different primary clocks in a network.
          example: 128
        logAnnounceInterval:
          type: integer
          description: Logarithmic value that controls the rate of PTP Announce packets from the PTP time server. Default is 1 (1 packet every 2 seconds), Unit packets/second.
          example: 1
          enum:
          - -3
          - -2
          - -1
          - 0
          - 1
        logSyncInterval:
          type: integer
          description: Logarithmic value that controls the rate of PTP Sync packets. Default is -4 (16 packets per second), Unit packets/second..
          example: -4
          enum:
          - -5
          - -4
          - -3
          - -2
          - -1
          - 0
          - 1
        logDelayReqInterval:
          type: integer
          description: Logarithmic value that controls the rate of PTP DelayReq packets. Default is -4 (16 packets per second), Unit packets/second..
          example: -4
          enum:
          - -5
          - -4
          - -3
          - -2
          - -1
          - 0
          - 1
        transportMode:
          type: string
          enum:
          - MULTICAST
          - UNICAST
          - HYBRID
        grantTime:
          maximum: 7200
          minimum: 30
          type: integer
          description: Unicast Grant Time in seconds. For Multicast and Hybrid transport modes, grant time defaults to 300 seconds. For Unicast mode, grant time can be between 30 to 7200.
          example: 300
      description: PTP Advanced Configuration.
