components:
  schemas:
    RouteTableEntryOrFilter:
      type: object
      properties:
        or:
          maxItems: 3
          type: array
          items:
            $ref: '#/components/schemas/RouteTableEntrySimpleExpression'
    CloudRouterCommandSearchSortCriteria:
      type: object
      properties:
        direction:
          $ref: '#/components/schemas/CloudRouterCommandSearchSortDirection'
        property:
          $ref: '#/components/schemas/CloudRouterCommandSearchSortBy'
    ConnectionRouteEntryFilter:
      type: object
      anyOf:
      - $ref: '#/components/schemas/ConnectionRouteEntrySimpleExpression'
      - $ref: '#/components/schemas/ConnectionRouteEntryOrFilter'
    RouteTableEntrySimpleExpression:
      type: object
      properties:
        property:
          type: string
          description: "Possible field names to use on filters:\n * `/type` - Route table entry type\n * `/prefix` - Route table entry prefix\n * `/nextHop` - Route table entry nextHop\n * `/state` - Route table entry state\n * `/MED` - Route table entry med\n * `/*` - all-category search\n"
          example: /type
        operator:
          type: string
          description: "Possible operators to use on filters:\n * `=` - equal\n * `!=` - not equal\n * `>` - greater than\n * `>=` - greater than or equal to\n * `<` - less than\n * `<=` - less than or equal to\n * `[NOT] BETWEEN` - (not) between\n * `[NOT] LIKE` - (not) like\n * `[NOT] IN` - (not) in\n * `~*` - case-insensitive like\n"
          example: '='
        values:
          type: array
          items:
            type: string
            example: IPv4_BGP_ROUTE
    Hop_probes:
      type: object
      properties:
        name:
          type: string
          example: dns.google
        ip:
          type: string
          example: 8.8.8.8
        asn:
          type: integer
          example: 15169
        rtt:
          type: string
          example: '11.764'
        annotation:
          type: string
    RouterPackageCode:
      type: string
      description: Router package code
      enum:
      - LAB
      - BASIC
      - STANDARD
      - ADVANCED
      - PREMIUM
    CloudRouterSimpleExpression:
      type: object
      properties:
        property:
          type: string
          description: "Possible field names to use on filters:\n * `/project/projectId` - project id (mandatory)\n * `/name` - Fabric Cloud Router name\n * `/uuid` - Fabric Cloud Router uuid\n * `/state` - Fabric Cloud Router status\n * `/location/metroCode` - Fabric Cloud Router metro code\n * `/location/metroName` - Fabric Cloud Router metro name\n * `/package/code` - Fabric Cloud Router package\n * `/*` - all-category search\n"
          example: /name
        operator:
          type: string
          description: "Possible operators to use on filters:\n * `=` - equal\n * `!=` - not equal\n * `>` - greater than\n * `>=` - greater than or equal to\n * `<` - less than\n * `<=` - less than or equal to\n * `[NOT] BETWEEN` - (not) between\n * `[NOT] LIKE` - (not) like\n * `[NOT] IN` - (not) in\n * `ILIKE` - case-insensitive like\n"
          example: '='
        values:
          type: array
          items:
            type: string
            example: FabricCloudRouter-1
    PackageChangeLog:
      type: object
      properties:
        createdDateTime:
          type: string
          format: date-time
          example: 2020-11-06 07:00:00+00:00
        updatedDateTime:
          type: string
          format: date-time
          example: 2020-11-06 07:00:00+00:00
      description: Cloud Router package change log
    RouteTableEntryState:
      type: string
      description: Route table entry state
      enum:
      - ACTIVE
    code:
      type: string
      description: Cloud Router package code
      example: LAB
      enum:
      - LAB
      - BASIC
      - STANDARD
      - ADVANCED
      - PREMIUM
    RouteTableEntryType:
      type: string
      description: Route table entry type
      enum:
      - IPv4_BGP_ROUTE
      - IPv4_STATIC_ROUTE
      - IPv4_DIRECT_ROUTE
      - IPv6_BGP_ROUTE
      - IPv6_STATIC_ROUTE
      - IPv6_DIRECT_ROUTE
    CloudRouterCommandSearchFilter:
      type: object
      anyOf:
      - $ref: '#/components/schemas/CloudRouterCommandSearchExpression'
      - $ref: '#/components/schemas/CloudRouterCommandSearchOrFilter'
    CloudRouterCommandSearchSortBy:
      type: string
      description: Possible field names to use on sorting
      default: /changeLog/updatedDateTime
      enum:
      - /changeLog/createdDateTime
      - /changeLog/updatedDateTime
      - /name
      - /type
    CloudRouterPostRequestPackage:
      required:
      - code
      type: object
      properties:
        href:
          type: string
          description: Fabric Cloud Router URI
          format: uri
          example: https://api.equinix.com/fabric/v4/routerPackages/LAB
        type:
          type: string
          description: Cloud Router package type
          example: ROUTER_PACKAGE
          enum:
          - ROUTER_PACKAGE
        code:
          type: string
          description: Cloud Router package code
          example: LAB
          enum:
          - LAB
          - BASIC
          - STANDARD
          - ADVANCED
          - PREMIUM
      description: Fabric Cloud Router Package Type
    ConnectionRouteSortCriteria:
      type: object
      properties:
        direction:
          $ref: '#/components/schemas/ConnectionRouteEntrySortDirection'
        property:
          $ref: '#/components/schemas/ConnectionRouteEntrySortBy'
    RouteTableEntrySearchRequest:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/RouteTableEntryFilters'
        pagination:
          $ref: '#/components/schemas/PaginationRequest'
        sort:
          type: array
          items:
            $ref: '#/components/schemas/RouteTableEntrySortCriteria'
      description: Search requests containing criteria
    CloudRouterSortBy:
      type: string
      description: Possible field names to use on sorting
      default: /changeLog/updatedDateTime
      enum:
      - /name
      - /uuid
      - /state
      - /location/metroCode
      - /location/metroName
      - /package/code
      - /changeLog/createdDateTime
      - /changeLog/updatedDateTime
    OutputStructuredPing:
      type: object
      properties:
        destinationIp:
          type: string
          example: 8.8.8.8
        destinationName:
          type: string
          example: 8.8.8.8
        dataBytes:
          type: integer
          example: 100
        packetsTransmitted:
          type: integer
          example: 4
        packetsReceived:
          type: integer
          example: 4
        packetsLossPercent:
          type: number
          format: float
          example: 0
        rttMin:
          type: number
          format: float
          example: 9.271
        rttAvg:
          type: number
          format: float
          example: 15.483
        rttMax:
          type: number
          format: float
          example: 26.771
        rttStdDev:
          type: number
          format: float
          example: 7.039
        responses:
          type: array
          items:
            $ref: '#/components/schemas/OutputStructuredPingResponseItem'
    CloudRouterActionState:
      type: string
      description: Cloud router action state
      enum:
      - SUCCEEDED
      - FAILED
      - PENDING
    CloudRouterCommandRequestPayload:
      required:
      - destination
      - sourceConnection
      type: object
      properties:
        destination:
          type: string
          description: Fabric Cloud Router Ping or Traceroute Command Destination
          example: 8.8.8.8
        sourceConnection:
          $ref: '#/components/schemas/CloudRouterCommandRequestConnection'
        timeout:
          type: integer
          description: "Timeout in seconds for Fabric Cloud Router Command:\n  - For `PING_COMMAND`: Packet timeout duration. The default value is 5.\n  - For `TRACEROUTE_COMMAND`: Probe timeout duration.\n    The default value is 2 and it is not configurable.\n"
          example: 2
        dataBytes:
          maximum: 9000
          minimum: 16
          type: integer
          description: "Ping Command DataBytes. \nThis field is only applicable for commands of type `PING_COMMAND`.\n"
          example: 100
          default: 64
        probes:
          type: integer
          description: 'Number of probes for Fabric Cloud Router Traceroute Command.

            This field is only applicable for commands of type `TRACEROUTE_COMMAND` and is not configurable.

            '
          example: 3
          default: 3
        hopsMax:
          maximum: 30
          type: integer
          description: 'Maximum number of hops for the traceroute command.

            This field is only applicable for commands of type `TRACEROUTE_COMMAND`.

            '
          example: 20
          default: 20
      description: Fabric Cloud Router Command Request
    CloudRouterCommandPingResponse:
      type: object
      properties:
        output:
          type: string
        outputStructuredPing:
          $ref: '#/components/schemas/OutputStructuredPing'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
    CloudRouterCommandType:
      type: string
      description: Fabric Cloud Router Command Type
      example: PING_COMMAND
      enum:
      - PING_COMMAND
      - TRACEROUTE_COMMAND
    CloudRouterCommandState:
      type: string
      description: Fabric Cloud Router Command State
      example: SUCCEEDED
      enum:
      - PENDING
      - SUCCEEDED
      - FAILED
      - DELETED
    CloudRouterCommandPostRequest:
      required:
      - project
      - request
      - type
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CloudRouterCommandType'
        name:
          type: string
          description: Customer-provided Cloud Router Command name
        description:
          type: string
          description: Customer-provided Cloud Router Command description
        project:
          $ref: '#/components/schemas/Project'
        request:
          $ref: '#/components/schemas/CloudRouterCommandRequestPayload'
