    name: Equinix Fabric API
    description: Equinix Fabric is a software-defined interconnection solution that enables direct, secure,
      and dynamic connections to distributed infrastructure and digital ecosystems across the Equinix
      platform, including cloud service providers, enterprises, and customer-owned instances.
    humanURL: https://developer.equinix.com/catalog/fabricv4
    baseURL: https://api.equinix.com
