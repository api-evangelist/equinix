  - aid: equinix:metal
    name: Equinix Metal API
    description: Equinix Metal provides a RESTful HTTP API for programmatically managing bare metal infrastructure
      including devices, networks, IP addresses, organizations, projects, and user accounts. Every feature
      of the Equinix Metal web interface is accessible through the API.
    humanURL: https://deploy.equinix.com/developers/api/metal/
