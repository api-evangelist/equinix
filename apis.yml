aid: equinix
name: Equinix
description: Equinix is a global digital infrastructure company that provides interconnection and data
  center services to enterprises, cloud and IT service providers, and telecommunications networks worldwide.
  Equinix exposes a broad set of public APIs covering interconnection (Fabric), bare metal compute (Metal),
  Internet access, colocation operations, orders, smart hands, and authentication.
